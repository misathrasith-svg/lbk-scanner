<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top" />
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>LBK Quick Check-In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #5b21b6 0%, #3b0f7a 100%);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px; color: white;
    }
    .card {
      background: white; color: #1f2937; border-radius: 20px;
      padding: 32px 28px; max-width: 460px; width: 100%;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4); text-align: center;
    }
    h1 { font-size: 24px; color: #1e3a5f; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
    .ref-display {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white; padding: 18px; border-radius: 14px;
      font-size: 28px; font-weight: 800; letter-spacing: 1px;
      margin-bottom: 20px; word-break: break-all;
    }
    .status {
      padding: 16px; border-radius: 12px; font-size: 15px;
      font-weight: 600; margin-bottom: 16px; display: none;
    }
    .status.info    { background: #dbeafe; color: #1e40af; display: block; }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error   { background: #fee2e2; color: #991b1b; display: block; }
    .status.warning { background: #fef3c7; color: #92400e; display: block; }
    button {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 17px; font-weight: 800; cursor: pointer;
      transition: transform 0.15s ease;
    }
    button:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #5b21b6, #3b0f7a); color: white; }
    .btn-ghost { background: #f3f4f6; color: #374151; margin-top: 10px; }
    .spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 3px solid #10b981; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .checkin-form { display: none; margin-top: 16px; }
    .checkin-form input {
      width: 100%; padding: 16px; border: 3px solid #5b21b6;
      border-radius: 12px; font-size: 22px; font-weight: 800;
      text-align: center; letter-spacing: 2px; margin-bottom: 12px;
    }
    .checkin-form input:focus {
      outline: none; border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25);
    }
    .meta {
      font-size: 12px; color: #9ca3af; margin-top: 16px;
      text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Quick Check-In</h1>
    <p class="subtitle">
      Reference detected from scanner. Confirm below or edit if needed.
    </p>

    <div class="ref-display" id="refDisplay">—</div>
    <div class="status" id="status"></div>

    <div class="checkin-form" id="checkinForm" style="display:none">
      <input
        type="text"
        id="refInput"
        placeholder="LBK26-FA-XXX"
        maxlength="20"
      />
    </div>

    <button class="btn-primary" id="confirmBtn">
      ✓ Confirm Check-In
    </button>
    <button class="btn-ghost" id="editBtn">Edit reference</button>

    <p class="meta">
      🔒 Authenticated via your Apps Script session.<br />
      Opens directly in your browser — no iframe.
    </p>
  </div>

  <script>
    (function () {
      "use strict";
      const $ = (id) => document.getElementById(id);
      const refDisplay = () => $("refDisplay");
      const statusEl = () => $("status");
      const refInput = () => $("refInput");
      const checkinForm = () => $("checkinForm");
      const confirmBtn = () => $("confirmBtn");
      const editBtn = () => $("editBtn");

      let currentRef = "";
      let processing = false;

      function setStatus(msg, type) {
        const el = statusEl();
        el.className = type || "";
        el.textContent = msg;
      }

      function setBusy(busy) {
        processing = busy;
        confirmBtn().disabled = busy;
        confirmBtn().innerHTML = busy
          ? '<span class="spinner"></span> Checking in…'
          : "✓ Confirm Check-In";
      }

      // Pick up the ref from sessionStorage (set by buildPage_ server-side
      // script injection) or from the ?ref= URL param directly.
      function getRefFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return (
          params.get("ref") ||
          (function () {
            try {
              return sessionStorage.getItem("lbk_qscan_ref") || "";
            } catch (e) {
              return "";
            }
          })()
        );
      }

      function normalize(s) {
        if (!s) return "";
        s = String(s).trim().toUpperCase();
        // Accept "FA-001" / "BA-001" — expand to canonical form
        const short = s.match(/^(FA|BA)-(\d+)$/);
        if (short) return "LBK26-" + short[1] + "-" + short[2].padStart(3, "0");
        // Otherwise accept only the canonical form
        if (/^LBK26-[FB]A-\d+$/.test(s)) return s;
        return "";
      }

      function init() {
        currentRef = normalize(getRefFromUrl());
        if (!currentRef) {
          setStatus("No reference number found. Please type it below.", "error");
          editBtn().style.display = "none";
          checkinForm().style.display = "block";
          refInput().focus();
          return;
        }
        refDisplay().textContent = currentRef;
        refInput().value = currentRef;
        // Auto-confirm after a short pause so the user sees what was scanned
        setStatus("Ready to check in. Tap Confirm, or edit the reference first.", "info");
      }

      function doCheckin(ref) {
        setBusy(true);
        setStatus("Checking in " + ref + "…", "info");
        if (typeof google !== "undefined" && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(function (resp) {
              setBusy(false);
              if (resp && resp.success) {
                setStatus(
                  "✅ " +
                    (resp.message || "Check-in successful!") +
                    "  Tap \"New Scan\" to do another.",
                  "success"
                );
                confirmBtn().innerHTML = "🔄 New Scan";
                confirmBtn().onclick = function () {
                  // Go back to the GitHub-Pages scanner
                  try { sessionStorage.removeItem("lbk_qscan_ref"); } catch (e) {}
                  history.length > 1 ? history.back() : location.reload();
                };
              } else {
                setStatus(
                  "❌ " + (resp && resp.message ? resp.message : "Check-in failed"),
                  "error"
                );
                confirmBtn().disabled = false;
              }
            })
            .withFailureHandler(function (err) {
              setBusy(false);
              setStatus("❌ Error: " + (err.message || err), "error");
              confirmBtn().disabled = false;
            })
            .processCheckInPublicScan(ref);
        } else {
          // Fallback: no google.script.run available (shouldn't happen since
          // this page is served by Apps Script itself, but just in case)
          setBusy(false);
          setStatus(
            "❌ Server connection unavailable. Please reload the page.",
            "error"
          );
        }
      }

      confirmBtn().onclick = function () {
        if (processing) return;
        const ref = checkinForm().style.display === "none"
          ? currentRef
          : normalize(refInput().value);
        if (!ref) {
          setStatus("Please enter a valid reference (e.g. LBK26-FA-001)", "error");
          refInput().focus();
          return;
        }
        doCheckin(ref);
      };

      editBtn().onclick = function () {
        checkinForm().style.display = "block";
        refInput().focus();
        refInput().select();
        editBtn().style.display = "none";
      };

      refInput().addEventListener("input", function () {
        const v = normalize(refInput().value);
        if (v) {
          refDisplay().textContent = v;
          currentRef = v;
        }
      });

      init();
    })();
  </script>
</body>
</html>
